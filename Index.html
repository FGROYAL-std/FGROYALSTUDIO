<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudioLens — Your 3D Photography Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
      overflow: hidden;
      color: #fff;
    }
    #login-form {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      width: 320px;
      z-index: 100;
      transition: all 0.4s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }
    #login-form h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
      font-weight: 600;
    }
    .input-group {
      margin: 15px 0;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.3);
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #00ffaa;
      box-shadow: 0 0 10px rgba(0,255,170,0.3);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #00ffaa;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background: #00cc88;
      transform: scale(1.02);
    }
    #gallery {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border-radius: 15px;
      z-index: 99;
      max-width: 80%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .gallery-item {
      margin: 10px;
      display: inline-block;
      width: 200px;
      height: 200px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0,255,170,0.5);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #scene-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div id="scene-container"></div>

  <div id="login-form">
    <h2>✨ Welcome to StudioLens</h2>
    <div class="input-group">
      <input type="text" placeholder="Your Name" id="name" />
    </div>
    <div class="input-group">
      <input type="email" placeholder="Email Address" id="email" />
    </div>
    <div class="input-group">
      <input type="text" placeholder="Phone (optional)" id="phone" />
    </div>
    <button id="login-btn">Book Your Session</button>
  </div>

  <div id="gallery">
    <h2>📸 Our Latest Work</h2>
    <div class="gallery-item"><img src="https://via.placeholder.com/200?text=Portrait+1" alt="Portrait 1" /></div>
    <div class="gallery-item"><img src="https://via.placeholder.com/200?text=Wedding+1" alt="Wedding 1" /></div>
    <div class="gallery-item"><img src="https://via.placeholder.com/200?text=Product+1" alt="Product 1" /></div>
    <div class="gallery-item"><img src="https://via.placeholder.com/200?text=Event+1" alt="Event 1" /></div>
    <div class="gallery-item"><img src="https://via.placeholder.com/200?text=Portrait+2" alt="Portrait 2" /></div>
    <div class="gallery-item"><img src="https://via.placeholder.com/200?text=Family+1" alt="Family 1" /></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Initialize Three.js Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene-container'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0x00ffaa, 1, 100);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    // Camera position
    camera.position.z = 30;

    // Create floating 3D objects (representing photos)
    const geometry = new THREE.BoxGeometry(5, 5, 0.1);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 0.7 });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Login Form Submission
    document.getElementById('login-btn').addEventListener('click', () => {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      if (name && email) {
        alert(`Thank you, ${name}! We’ll contact you at ${email} to schedule your session.`);
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('gallery').style.display = 'block';
      } else {
        alert('Please fill in your name and email.');
      }
    });

    // Gallery item click
    document.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', () => {
        alert('This image is part of our gallery. Contact us to book a similar shoot!');
      });
    });
  </script>
</body>
</html>
